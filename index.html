<!DOCTYPE html><html><head>
  <base href="/saqta-web/">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="Saqta — personal finance for Kazakhstan">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Saqta">
  <title>Saqta</title>
  <link rel="manifest" href="manifest.json">

  <!-- Telegram Mini App: load the WebApp SDK so Saqta can read Telegram's theme
       and behave like a Mini App (expand to the full WebView height). Harmless
       outside Telegram — window.Telegram is simply absent there. -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script id="telegram-init">
    (function () {
      var tg = window.Telegram && window.Telegram.WebApp;
      if (tg) {
        // Signal load complete + use the full height; match the pure-black canvas.
        try { tg.ready(); tg.expand(); } catch (e) {}
        // Stop Telegram from treating in-app vertical scrolls as "drag to close"
        // (Bot API 7.7+), so lists scroll instead of dragging the whole window.
        try { tg.disableVerticalSwipes && tg.disableVerticalSwipes(); } catch (e) {}
        try { tg.setHeaderColor && tg.setHeaderColor('#000000'); } catch (e) {}
        try { tg.setBackgroundColor && tg.setBackgroundColor('#000000'); } catch (e) {}
      }
      // Ask for durable storage so the local-first Hive cache (IndexedDB in the
      // WebView) resists eviction — the exact failure that lost data in the old
      // client-storage Mini App.
      if (navigator.storage && navigator.storage.persist) {
        navigator.storage.persist().catch(function () {});
      }
    })();
  </script>
  
  
  
  
  <style id="splash-screen-style">
    html {
      height: 100%
    }

    body {
      margin: 0;
      min-height: 100%;
      background-color: #1E0B00;
          background-size: 100% 100%;
    }

    .center {
      margin: 0;
      position: absolute;
      top: 50%;
      left: 50%;
      -ms-transform: translate(-50%, -50%);
      transform: translate(-50%, -50%);
    }

    .contain {
      display:block;
      width:100%; height:100%;
      object-fit: contain;
    }

    .stretch {
      display:block;
      width:100%; height:100%;
    }

    .cover {
      display:block;
      width:100%; height:100%;
      object-fit: cover;
    }

    .bottom {
      position: absolute;
      bottom: 0;
      left: 50%;
      -ms-transform: translate(-50%, 0);
      transform: translate(-50%, 0);
    }

    .bottomLeft {
      position: absolute;
      bottom: 0;
      left: 0;
    }

    .bottomRight {
      position: absolute;
      bottom: 0;
      right: 0;
    }
  </style>
  <script id="splash-screen-script">
    function removeSplashFromWeb() {
      document.getElementById("splash")?.remove();
      document.getElementById("splash-branding")?.remove();
      document.body.style.background = "transparent";
    }
  </script>
</head>
<body>
  <picture id="splash">
      <source srcset="splash/img/light-1x.png 1x, splash/img/light-2x.png 2x, splash/img/light-3x.png 3x, splash/img/light-4x.png 4x" media="(prefers-color-scheme: light)">
      <source srcset="splash/img/dark-1x.png 1x, splash/img/dark-2x.png 2x, splash/img/dark-3x.png 3x, splash/img/dark-4x.png 4x" media="(prefers-color-scheme: dark)">
      <img class="center" aria-hidden="true" src="splash/img/light-1x.png" alt="">
  </picture>
  
  
  <script src="flutter_bootstrap.js" async=""></script>


</body></html>
